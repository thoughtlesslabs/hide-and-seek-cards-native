<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #1a1a1a; }
      .foreground { fill: #d97706; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #1a1a1a; }
      .foreground { fill: #d97706; }
    }
  </style>
  <g clip-path="url(#clip0)">
    <rect class="background" width="180" height="180" rx="37" />
    <g style="transform: scale(85%); transform-origin: center">
      <!-- Card shape -->
      <rect class="foreground" x="55" y="35" width="70" height="95" rx="8" opacity="0.3"/>
      <rect class="foreground" x="50" y="40" width="70" height="95" rx="8" opacity="0.6"/>
      <rect class="foreground" x="45" y="45" width="70" height="95" rx="8"/>
      <!-- Question mark -->
      <text class="background" x="80" y="105" font-size="50" font-family="serif" font-weight="bold" text-anchor="middle">?</text>
    </g>
  </g>
  <defs>
    <clipPath id="clip0">
      <rect width="180" height="180" fill="white" />
    </clipPath>
  </defs>
</svg>
